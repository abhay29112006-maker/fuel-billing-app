<!DOCTYPE html>
<html>
<head>
  <title>Fuel Billing System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>⛽ Fuel Billing System</h1>

  <div class="card">
    <label>Fuel Type</label>
    <select id="fuel">
      <option value="petrol">Petrol</option>
      <option value="diesel">Diesel</option>
    </select>

    <label>Litres</label>
    <input type="number" id="litres" placeholder="Enter litres">

    <button onclick="calculateBill()">Generate Bill</button>
  </div>

  <div class="result-card">
    <h2>Bill Details</h2>
    <p id="details"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
